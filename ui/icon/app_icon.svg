<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#166CFC" />
      <stop offset="100%" style="stop-color:#0D47A1" />
    </linearGradient>
    <radialGradient id="blue" cx="40%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#90CAF9" />
      <stop offset="60%" style="stop-color:#1E88E5" />
      <stop offset="100%" style="stop-color:#0D47A1" />
    </radialGradient>
    <radialGradient id="red" cx="40%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#F49592" />
      <stop offset="60%" style="stop-color:#E53935" />
      <stop offset="100%" style="stop-color:#B71C1C" />
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="512" height="512" rx="96" fill="url(#bg)" />

  <!-- 前区 5 个蓝色圆球 -->
  <circle cx="95" cy="220" r="48" fill="url(#blue)" />
  <circle cx="165" cy="145" r="48" fill="url(#blue)" />
  <circle cx="265" cy="115" r="52" fill="url(#blue)" />
  <circle cx="365" cy="145" r="48" fill="url(#blue)" />
  <circle cx="430" cy="220" r="48" fill="url(#blue)" />

  <!-- 后区 2 个红色圆球 -->
  <circle cx="180" cy="360" r="46" fill="url(#red)" />
  <circle cx="345" cy="360" r="46" fill="url(#red)" />
</svg>
