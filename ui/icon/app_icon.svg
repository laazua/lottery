<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A237E;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#283593;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3F51B5;stop-opacity:1" />
    </linearGradient>

    <!-- 号码球 1 渐变（前区蓝色系） -->
    <radialGradient id="ball1Grad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#64B5F6;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#1E88E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1565C0;stop-opacity:1" />
    </radialGradient>

    <!-- 号码球 2 渐变（前区蓝色系） -->
    <radialGradient id="ball2Grad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#90CAF9;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#42A5F5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E88E5;stop-opacity:1" />
    </radialGradient>

    <!-- 号码球 3 渐变（前区蓝色系） -->
    <radialGradient id="ball3Grad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#42A5F5;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#1976D2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D47A1;stop-opacity:1" />
    </radialGradient>

    <!-- 号码球 4 渐变（前区蓝色系） -->
    <radialGradient id="ball4Grad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#BBDEFB;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#64B5F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E88E5;stop-opacity:1" />
    </radialGradient>

    <!-- 号码球 5 渐变（前区蓝色系） -->
    <radialGradient id="ball5Grad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#82B1FF;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#448AFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2962FF;stop-opacity:1" />
    </radialGradient>

    <!-- 后区号码球渐变（红色系） -->
    <radialGradient id="ball6Grad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#EF9A9A;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#E53935;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B71C1C;stop-opacity:1" />
    </radialGradient>

    <radialGradient id="ball7Grad" cx="35%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#FFCDD2;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#EF5350;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C62828;stop-opacity:1" />
    </radialGradient>

    <!-- 高光 -->
    <radialGradient id="highlight" cx="30%" cy="25%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.6" />
      <stop offset="60%" style="stop-color:#FFFFFF;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0" />
    </radialGradient>

    <!-- 底部阴影 -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>

    <filter id="ballShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- 圆角矩形背景 -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#bgGrad)" />

  <!-- 装饰性背景圆环 -->
  <circle cx="256" cy="280" r="180" fill="none" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="2"/>
  <circle cx="256" cy="280" r="140" fill="none" stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="1"/>

  <!-- ========== 前区号码球（5 个，蓝色系弧线排列） ========== -->

  <!-- 球 1（左上） -->
  <g filter="url(#ballShadow)">
    <circle cx="136" cy="208" r="42" fill="url(#ball1Grad)" />
    <circle cx="136" cy="208" r="42" fill="url(#highlight)" />
    <text x="136" y="220" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">05</text>
  </g>

  <!-- 球 2（左中） -->
  <g filter="url(#ballShadow)">
    <circle cx="200" cy="168" r="42" fill="url(#ball2Grad)" />
    <circle cx="200" cy="168" r="42" fill="url(#highlight)" />
    <text x="200" y="180" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">12</text>
  </g>

  <!-- 球 3（中上） -->
  <g filter="url(#ballShadow)">
    <circle cx="272" cy="152" r="44" fill="url(#ball3Grad)" />
    <circle cx="272" cy="152" r="44" fill="url(#highlight)" />
    <text x="272" y="164" font-family="Arial, sans-serif" font-size="34" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">18</text>
  </g>

  <!-- 球 4（右中） -->
  <g filter="url(#ballShadow)">
    <circle cx="344" cy="176" r="42" fill="url(#ball4Grad)" />
    <circle cx="344" cy="176" r="42" fill="url(#highlight)" />
    <text x="344" y="188" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">23</text>
  </g>

  <!-- 球 5（右上） -->
  <g filter="url(#ballShadow)">
    <circle cx="396" cy="218" r="42" fill="url(#ball5Grad)" />
    <circle cx="396" cy="218" r="42" fill="url(#highlight)" />
    <text x="396" y="230" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">31</text>
  </g>

  <!-- ========== 后区号码球（2 个，红色系底部弧线排列） ========== -->

  <!-- 球 6（左下） -->
  <g filter="url(#ballShadow)">
    <circle cx="196" cy="302" r="38" fill="url(#ball6Grad)" />
    <circle cx="196" cy="302" r="38" fill="url(#highlight)" />
    <text x="196" y="312" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">07</text>
  </g>

  <!-- 球 7（右下） -->
  <g filter="url(#ballShadow)">
    <circle cx="316" cy="302" r="38" fill="url(#ball7Grad)" />
    <circle cx="316" cy="302" r="38" fill="url(#highlight)" />
    <text x="316" y="312" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">11</text>
  </g>

  <!-- ========== 底部品牌文字 ========== -->
  <text x="256" y="430" font-family="'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif" font-size="36" font-weight="500" fill="#FFFFFF" fill-opacity="0.92" text-anchor="middle" dominant-baseline="middle" letter-spacing="4">大乐透助手</text>

  <!-- 底部细线条（装饰） -->
  <line x1="140" y1="460" x2="372" y2="460" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="1"/>
</svg>
